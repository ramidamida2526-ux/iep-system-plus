<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | IN-CARE Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; max-width: 400px; width: 100%; }
        .login-header { background: #1e272e; color: white; padding: 30px 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="login-header">
            <h3 class="fw-bold text-warning mb-1"><i class="fa-solid fa-shield-halved"></i> IN-CARE Plus</h3>
            <p class="mb-0 text-white-50">กรุณาเข้าสู่ระบบเพื่อใช้งาน</p>
        </div>
        <div class="card-body p-4 bg-white">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} py-2 text-center small">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">ชื่อผู้ใช้งาน (Username)</label>
                    <input type="text" name="username" class="form-control" placeholder="พิมพ์ชื่อผู้ใช้งาน..." required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">รหัสผ่าน (Password)</label>
                    <input type="password" name="password" class="form-control" placeholder="พิมพ์รหัสผ่าน..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>
</body>
</html>
