<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - IEP Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .register-card { max-width: 450px; margin: 80px auto; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card register-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold text-primary">สมัครสมาชิก IEP Plus</h3>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="{{ url_for('register') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">ชื่อ-นามสกุลของคุณครู</label>
                        <input type="text" name="name" class="form-control" placeholder="เช่น นางมิดา ประเสริฐ" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ชื่อผู้ใช้งาน (Username)</label>
                        <input type="text" name="username" class="form-control" placeholder="ภาษาอังกฤษหรือตัวเลข" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">รหัสผ่าน (Password)</label>
                        <input type="password" name="password" class="form-control" placeholder="กำหนดรหัสผ่าน" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-medium">ยืนยันการสมัครสมาชิก</button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('login') }}" class="text-decoration-none text-muted small">มีบัญชีอยู่แล้ว? เข้าสู่ระบบที่นี่</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
