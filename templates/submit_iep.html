<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งแผน IEP - IEP Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4ff;
        }
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4361ee, #7209b7);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 500;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #3a56d4, #6308a1);
            color: white;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <a href="/" class="btn btn-light text-muted mb-4 shadow-sm" style="border-radius: 8px;">
                ← กลับหน้าหลัก
            </a>

            <div class="card form-card p-4 bg-white">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">ส่งแผน IEP เพื่อรับการวิเคราะห์</h3>
                    <p class="text-muted small">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อส่งข้อมูลเข้าสู่ระบบส่วนกลาง</p>
                </div>

                <form action="/submit-iep" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-4">
                        <label class="form-label fw-medium">ชื่อโรงเรียน</label>
                        <select name="school_name" class="form-select" style="border-radius: 8px;" required>
                            <option value="" disabled selected>-- เลือกโรงเรียนสังกัด สพม.หนองคาย --</option>
                            <option value="โรงเรียนปทุมเทพวิทยาคาร">โรงเรียนปทุมเทพวิทยาคาร</option>
                            <option value="โรงเรียนน้ำสวยวิทยา">โรงเรียนน้ำสวยวิทยา</option>
                            <option value="โรงเรียนหินโงมพิทยาคม">โรงเรียนหินโงมพิทยาคม</option>
                            <option value="โรงเรียนค่ายบกหวานวิทยา">โรงเรียนค่ายบกหวานวิทยา</option>
                            <option value="โรงเรียนหนองคายวิทยาคาร">โรงเรียนหนองคายวิทยาคาร</option>
                            <option value="โรงเรียนเวียงคำวิทยาคาร">โรงเรียนเวียงคำวิทยาคาร</option>
                            <option value="โรงเรียนฝางพิทยาคาม">โรงเรียนฝางพิทยาคม</option>
                            <option value="โรงเรียนพระธาตุบังพวนวิทยา">โรงเรียนพระธาตุบังพวนวิทยา</option>
                            <option value="โรงเรียนท่าบ่อ">โรงเรียนท่าบ่อ</option>
                            <option value="โรงเรียนท่าบ่อท่าบ่อพิทยาคม">โรงเรียนท่าบ่อท่าบ่อพิทยาคม</option>
                            <option value="โรงเรียนโคกคอนวิทยาคม">โรงเรียนโคกคอนวิทยาคม</option>
                            <option value="โรงเรียนเดื่อวิทยาคาร">โรงเรียนเดื่อวิทยาคาร</option>
                            <option value="โรงเรียนถ่อนวิทยา">โรงเรียนถ่อนวิทยา</option>
                            <option value="โรงเรียนหนองนางพิทยาคม">โรงเรียนหนองนางพิทยาคม</option>
                            <option value="โรงเรียนสังคมวิทยา">โรงเรียนสังคมวิทยา</option>
                            <option value="โรงเรียนวังม่วงพิทยาคม">โรงเรียนวังม่วงพิทยาคม</option>
                            <option value="โรงเรียนพระพุทธบาทพิทยาคม">โรงเรียนพระพุทธบาทพิทยาคม</option>
                            <option value="โรงเรียนพานพร้าว">โรงเรียนพานพร้าว</option>
                            <option value="โรงเรียนวรลาโภนุสรณ์">โรงเรียนวรลาโภนุสรณ์</option>
                            <option value="โรงเรียนโพธิ์ตากพิทยาคม">โรงเรียนโพธิ์ตากพิทยาคม</option>
                            <option value="โรงเรียนชุมพลโพนพิสัย">โรงเรียนชุมพลโพนพิสัย</option>
                            <option value="โรงเรียนนาหนังพัฒนศึกษา">โรงเรียนนาหนังพัฒนศึกษา</option>
                            <option value="โรงเรียนปากสวยพิทยาคม">โรงเรียนปากสวยพิทยาคม</option>
                            <option value="โรงเรียนร่มธรรมมานุสรณ์">โรงเรียนร่มธรรมมานุสรณ์</option>
                            <option value="โรงเรียนกุดบงพิทยาคาร">โรงเรียนกุดบงพิทยาคาร</option>
                            <option value="โรงเรียนวังหลวงพิทยาสรรพ์">โรงเรียนวังหลวงพิทยาสรรพ์</option>
                            <option value="โรงเรียนประชาบดีพิทยาคม">โรงเรียนประชาบดีพิทยาคม</option>
                            <option value="โรงเรียนพระบาทนาสิงห์พิทยาคม">โรงเรียนพระบาทนาสิงห์พิทยาคม</option>
                            <option value="โรงเรียนนาดีพิทยาคม">โรงเรียนนาดีพิทยาคม</option>
                            <option value="โรงเรียนเซิมพิทยาคม">โรงเรียนเซิมพิทยาคม</option>
                            </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">ปีการศึกษา</label>
                        <select name="academic_year" class="form-select" style="border-radius: 8px;" required>
                            <option value="2569" selected>2569</option>
                            <option value="2568">2568</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">แนบไฟล์แผน IEP (รองรับเฉพาะ PDF)</label>
                        <input type="file" name="iep_file" class="form-control" accept=".pdf" style="border-radius: 8px;" required>
                    </div>

                    <button type="submit" class="btn btn-gradient w-100 mt-2">
                        🚀 ส่งข้อมูลและเริ่มวิเคราะห์ด้วย AI
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
